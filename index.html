<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Reel Frenzy - A Cozy Fishing Adventure</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="game">
  <canvas id="canvas"></canvas>

  <div class="hud">
    <div class="top-bar">
      <div class="stats">
        <div class="chip gold"><span class="icon">🪙</span><span class="v" id="gold">0</span></div>
        <div class="chip"><span class="icon">🐟</span><span class="v" id="caught">0</span></div>
        <div class="chip rod"><span class="icon">🎣</span><span class="v" id="rod">Bamboo</span></div>
        <div class="chip zone"><span class="icon">🌊</span><span class="v" id="zone">Pond</span></div>
        <div class="chip" id="streak-display" style="display:none"><span class="icon">🔥</span><span class="v">x1.0</span></div>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="btn-quest" title="Quests">📋</button>
        <button class="icon-btn" id="btn-bestiary" title="Bestiary">📖</button>
        <button class="icon-btn" id="btn-zone" title="Zones">🗺️</button>
        <button class="icon-btn" id="btn-shop" title="Shop">🛒</button>
        <button class="icon-btn" id="btn-inv" title="Inventory">🎒</button>
        <button class="icon-btn" id="btn-mute" title="Mute">🔊</button>
      </div>
    </div>

    <div class="energy-wrap">
      <div class="energy-bar"><div class="energy-fill" id="energy-fill"></div></div>
      <div class="energy-text" id="energy-text">30/30</div>
    </div>

    <div class="power-meter" id="power-meter">
      <div class="power-fill" id="power-fill"></div>
    </div>

    <div class="reel-game" id="reel-game">
      <div class="reel-progress"><div class="reel-progress-fill" id="reel-progress"></div></div>
      <div class="reel-track">
        <div class="reel-zone" id="reel-zone"></div>
        <div class="reel-fish" id="reel-fish">🐟</div>
      </div>
    </div>

    <div class="action-area">
      <div class="hint" id="hint">Tap CAST to throw your line</div>
      <button class="action-btn" id="action-btn">CAST 🎣</button>
    </div>

    <div class="catch-card" id="catch-card">
      <div class="emoji" id="catch-emoji">🐟</div>
      <h2 id="catch-name">Sardine</h2>
      <span class="rarity-tag rarity-Common" id="catch-rarity">Common</span>
      <div class="stats-row">
        <div>⚖️ <b id="catch-weight">1.0kg</b></div>
        <div>🪙 <b id="catch-value">+5</b></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <!-- Tutorial Overlay -->
  <div id="tutorial-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px;">
    <p id="tutorial-text" style="color:#fff;font-size:20px;font-weight:700;text-align:center;max-width:80vw;"></p>
    <p style="color:#a8c8e6;font-size:14px;">Tap anywhere to continue</p>
  </div>

  <!-- Modals -->
  <div class="modal" id="zone-modal"><div class="modal-content"><span class="modal-close" data-close="zone-modal">&times;</span><h2>🗺️ Fishing Zones</h2><div id="zone-list"></div></div></div>
  <div class="modal" id="shop-modal"><div class="modal-content"><span class="modal-close" data-close="shop-modal">&times;</span><h2>🛒 Tackle Shop</h2><div id="shop-list"></div></div></div>
  <div class="modal" id="inv-modal"><div class="modal-content"><span class="modal-close" data-close="inv-modal">&times;</span><h2>🎒 Bait Bucket</h2><div id="inv-summary" style="text-align:center;color:#a8c8e6;font-size:13px;margin-bottom:8px;"></div><div class="inv-grid" id="inv-grid"></div><div style="display:flex;gap:8px;margin-top:14px;"><button class="small-btn gold" id="sell-all" style="flex:1;">💰 Sell All</button></div></div></div>
  <div class="modal" id="quest-modal"><div class="modal-content"><span class="modal-close" data-close="quest-modal">&times;</span><h2>📋 Daily Quests</h2><div id="quest-list"></div></div></div>
  <div class="modal" id="bestiary-modal"><div class="modal-content"><span class="modal-close" data-close="bestiary-modal">&times;</span><h2>📖 Bestiary</h2><div class="inv-grid" id="bestiary-list"></div></div></div>
</div>

<!-- Scripts (order matters) -->
<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/render.js"></script>
<script src="js/fishing.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
